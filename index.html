<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>트렌드 모아보기</title>
<style>
  :root {
    --bg: #fbf6ee;
    --card: #ffffff;
    --text: #14121a;
    --muted: #6b6478;
    --accent: #5b3df6;
    --accent2: #ff5da2;
    --border: #14121a;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    background: var(--bg);
    background-image: radial-gradient(rgba(20,18,26,0.06) 1.5px, transparent 1.5px);
    background-size: 22px 22px;
    color: var(--text);
  }
  html {
    font-size: 16px;
  }
  header {
    padding: 32px 20px 16px;
    max-width: clamp(1000px, 92vw, 1600px);
    margin: 0 auto;
  }
  .header-row {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }
  .font-ctrl {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--card);
    border: 2.5px solid var(--border);
    border-radius: 999px;
    padding: 5px 8px;
    box-shadow: 3px 3px 0 var(--border);
    flex-shrink: 0;
  }
  .font-ctrl button {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 2px solid var(--border);
    background: var(--card);
    font-weight: 800;
    font-size: 0.75rem;
    cursor: pointer;
    color: var(--text);
    line-height: 1;
  }
  .font-ctrl button:hover {
    background: var(--bg);
  }
  #fontLabel {
    font-size: 0.6875rem;
    font-weight: 700;
    color: var(--muted);
    min-width: 34px;
    text-align: center;
  }
  h1 {
    font-size: 1.875rem;
    font-weight: 900;
    letter-spacing: -0.5px;
    margin: 0 0 6px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    display: inline-block;
  }
  .sub {
    color: var(--muted);
    font-size: 0.8125rem;
    font-weight: 600;
  }
  .tabs {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    max-width: clamp(1000px, 92vw, 1600px);
    margin: 16px auto 0;
    padding: 0 20px;
  }
  .tab {
    padding: 8px 16px;
    border-radius: 999px;
    border: 2.5px solid var(--border);
    background: var(--card);
    font-size: 0.8125rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--text);
    white-space: nowrap;
    box-shadow: 3px 3px 0 var(--border);
    transition: transform 0.12s, box-shadow 0.12s;
  }
  .tab:hover {
    transform: translate(-1px, -1px);
    box-shadow: 4px 4px 0 var(--border);
  }
  .tab.active {
    background: var(--text);
    color: white;
    border-color: var(--border);
    transform: translate(2px, 2px);
    box-shadow: 1px 1px 0 var(--border);
  }
  main {
    max-width: clamp(1000px, 92vw, 1600px);
    margin: 24px auto 60px;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 20px;
  }
  .card {
    background: var(--card);
    border: 2.5px solid var(--border);
    border-radius: 18px;
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 9px;
    text-decoration: none;
    color: var(--text);
    cursor: pointer;
    box-shadow: 5px 5px 0 var(--cat-color, var(--border));
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .card:hover {
    transform: translate(-3px, -3px) rotate(-0.4deg);
    box-shadow: 8px 8px 0 var(--cat-color, var(--border));
  }
  .category-tag {
    display: inline-block;
    align-self: flex-start;
    font-size: 0.6875rem;
    font-weight: 800;
    letter-spacing: 0.2px;
    padding: 4px 10px;
    border-radius: 999px;
    background: var(--cat-color, #eee);
    color: white;
  }
  .tab-dot {
    display: inline-block;
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 6px;
    vertical-align: middle;
  }
  .card-meta {
    display: flex;
    justify-content: space-between;
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 600;
  }
  .card-source {
    font-weight: 800;
    color: var(--text);
  }
  .card-new {
    display: inline-block;
    font-size: 0.625rem;
    font-weight: 900;
    color: white;
    background: var(--accent2);
    padding: 2px 7px;
    border-radius: 999px;
    margin-left: 6px;
    vertical-align: middle;
  }
  .card-title {
    font-size: 1rem;
    font-weight: 800;
    line-height: 1.4;
  }
  .card-summary {
    font-size: 0.8125rem;
    color: var(--muted);
    line-height: 1.55;
    font-weight: 500;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
  }
  .empty {
    text-align: center;
    color: var(--muted);
    font-weight: 700;
    padding: 60px 20px;
    grid-column: 1 / -1;
  }
  .banner-card {
    grid-column: 1 / -1;
    background: linear-gradient(120deg, var(--accent), var(--accent2));
    border: 3px solid var(--border);
    border-radius: 20px;
    padding: 26px 28px;
    color: white;
    display: flex;
    flex-direction: column;
    gap: 9px;
    cursor: pointer;
    box-shadow: 6px 6px 0 var(--border);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .banner-card:hover {
    transform: translate(-3px, -3px) rotate(-0.3deg);
    box-shadow: 9px 9px 0 var(--border);
  }
  .banner-tag {
    align-self: flex-start;
    font-size: 0.75rem;
    font-weight: 900;
    letter-spacing: 0.4px;
    background: rgba(255,255,255,0.25);
    padding: 4px 12px;
    border-radius: 999px;
  }
  .banner-title {
    font-size: 1.55rem;
    font-weight: 900;
    line-height: 1.35;
  }
  .banner-reason {
    font-size: 0.875rem;
    font-weight: 600;
    opacity: 0.92;
  }
  .banner-meta {
    display: flex;
    gap: 8px;
    font-size: 0.75rem;
    font-weight: 700;
    opacity: 0.85;
  }
  .overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(20,18,26,0.55);
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 100;
  }
  .overlay.open {
    display: flex;
  }
  @keyframes modalPop {
    from { transform: scale(0.94) translateY(8px); opacity: 0; }
    to { transform: scale(1) translateY(0); opacity: 1; }
  }
  .modal {
    background: var(--card);
    border: 3px solid var(--border);
    border-radius: 20px;
    box-shadow: 8px 8px 0 var(--border);
    max-width: 640px;
    width: 100%;
    max-height: 85vh;
    overflow-y: auto;
    padding: 26px;
    position: relative;
    animation: modalPop 0.18s ease-out;
  }
  .modal-close {
    position: absolute;
    top: 14px;
    right: 16px;
    border: 2px solid var(--border);
    background: var(--card);
    width: 30px;
    height: 30px;
    border-radius: 50%;
    font-size: 0.9375rem;
    font-weight: 700;
    cursor: pointer;
    color: var(--text);
  }
  .modal-meta {
    display: flex;
    gap: 8px;
    align-items: center;
    font-size: 0.8125rem;
    color: var(--muted);
    font-weight: 700;
    margin-bottom: 8px;
  }
  .modal-source {
    font-weight: 800;
    color: var(--accent);
  }
  .modal-title {
    font-size: 1.25rem;
    font-weight: 800;
    line-height: 1.4;
    margin: 0 0 16px;
  }
  .modal-body {
    font-size: 0.875rem;
    line-height: 1.7;
    word-break: break-word;
  }
  .modal-body img {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
  }
  .modal-excerpt-note {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 600;
    margin-bottom: 14px;
    padding: 10px 12px;
    background: var(--bg);
    border-radius: 10px;
  }
  .modal-link {
    display: inline-block;
    margin-top: 18px;
    margin-right: 10px;
    padding: 10px 18px;
    border-radius: 999px;
    border: 2.5px solid var(--border);
    background: var(--accent);
    color: white;
    text-decoration: none;
    font-size: 0.875rem;
    font-weight: 800;
    box-shadow: 3px 3px 0 var(--border);
  }
  .ai-badge {
    display: inline-block;
    font-size: 0.6875rem;
    font-weight: 800;
    color: white;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    padding: 4px 10px;
    border-radius: 999px;
    margin-bottom: 10px;
  }
  .ai-summary-text {
    white-space: pre-line;
  }
  .modal-toggle-full {
    display: none;
    margin-top: 18px;
    padding: 10px 18px;
    border-radius: 999px;
    border: 2.5px solid var(--border);
    background: var(--card);
    color: var(--text);
    font-size: 0.875rem;
    font-weight: 800;
    box-shadow: 3px 3px 0 var(--border);
    cursor: pointer;
  }
  .modal-full-content {
    display: none;
    margin-top: 16px;
    padding-top: 16px;
    border-top: 2.5px dashed var(--border);
  }
</style>
</head>
<body>
<header>
  <div class="header-row">
    <div>
      <h1>📈 트렌드 모아보기</h1>
      <div class="sub">캐릿·뉴닉·아웃스탠딩·GeekNews 등에서 자동 수집</div>
    </div>
    <div class="font-ctrl" id="fontCtrl">
      <button id="fontDown" type="button" title="글자 작게">A-</button>
      <span id="fontLabel">100%</span>
      <button id="fontUp" type="button" title="글자 크게">A+</button>
    </div>
  </div>
</header>
<div class="tabs" id="tabs"></div>
<main id="grid">
  <div class="empty">불러오는 중...</div>
</main>
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-meta">
      <span class="modal-source" id="modalSource"></span>
      <span id="modalTime"></span>
    </div>
    <h2 class="modal-title" id="modalTitle"></h2>
    <div id="modalExcerptNote" class="modal-excerpt-note" style="display:none;"></div>
    <div class="modal-body" id="modalBody"></div>
    <div class="modal-full-content" id="modalFullContent"></div>
    <div>
      <a class="modal-link" id="modalLink" href="#" target="_blank" rel="noopener">원문 보러가기 →</a>
      <button class="modal-toggle-full" id="modalToggleFull"></button>
    </div>
  </div>
</div>
<script>
const grid = document.getElementById('grid');
const tabsEl = document.getElementById('tabs');
const overlay = document.getElementById('overlay');
let currentCategory = null;
let currentItems = [];

const FONT_MIN = 0.85;
const FONT_MAX = 1.4;
const FONT_STEP = 0.1;

function applyFontScale(scale) {
  document.documentElement.style.fontSize = (16 * scale) + 'px';
  document.getElementById('fontLabel').textContent = Math.round(scale * 100) + '%';
  localStorage.setItem('trendFontScale', String(scale));
}

let fontScale = parseFloat(localStorage.getItem('trendFontScale')) || 1;
applyFontScale(fontScale);

document.getElementById('fontUp').addEventListener('click', () => {
  fontScale = Math.min(FONT_MAX, +(fontScale + FONT_STEP).toFixed(2));
  applyFontScale(fontScale);
});
document.getElementById('fontDown').addEventListener('click', () => {
  fontScale = Math.max(FONT_MIN, +(fontScale - FONT_STEP).toFixed(2));
  applyFontScale(fontScale);
});

function timeAgo(ts) {
  const diff = Math.floor(Date.now() / 1000) - ts;
  if (diff < 3600) return Math.floor(diff / 60) + '분 전';
  if (diff < 86400) return Math.floor(diff / 3600) + '시간 전';
  return Math.floor(diff / 86400) + '일 전';
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function categoryHue(category) {
  let hash = 0;
  for (let i = 0; i < category.length; i++) {
    hash = (hash * 31 + category.charCodeAt(i)) % 360;
  }
  return hash;
}

function categoryColors(category) {
  const hue = categoryHue(category || '');
  return {
    border: `hsl(${hue}, 80%, 52%)`,
  };
}

function cardHtml(item, idx) {
  const c = categoryColors(item.category);
  const isNew = (Math.floor(Date.now() / 1000) - item.published_ts) < 7200;
  return `
    <div class="card" data-idx="${idx}" style="--cat-color:${c.border};">
      <div class="card-meta">
        <span class="card-source">${escapeHtml(item.source)}${isNew ? '<span class="card-new">NEW</span>' : ''}</span>
        <span>${timeAgo(item.published_ts)}</span>
      </div>
      <span class="category-tag" style="--cat-color:${c.border};">${escapeHtml(item.category)}</span>
      <div class="card-title">${escapeHtml(item.title)}</div>
      ${item.ai_summary || item.summary ? `<div class="card-summary">${escapeHtml(item.ai_summary || item.summary)}</div>` : ''}
    </div>
  `;
}

function bannerHtml(item, idx) {
  return `
    <div class="banner-card" data-idx="${idx}">
      <span class="banner-tag">🔥 지금 뜨는 트렌드 PICK</span>
      <div class="banner-title">${escapeHtml(item.title)}</div>
      ${item.feature_reason ? `<div class="banner-reason">${escapeHtml(item.feature_reason)}</div>` : ''}
      <div class="banner-meta">
        <span>${escapeHtml(item.source)}</span>
        <span>${timeAgo(item.published_ts)}</span>
      </div>
    </div>
  `;
}

function renderItems(items) {
  currentItems = items;
  if (!items.length) {
    grid.innerHTML = '<div class="empty">아직 수집된 글이 없어요. 잠시 후 다시 확인해주세요.</div>';
    return;
  }
  const featured = [];
  const normal = [];
  items.forEach((item, idx) => (item.featured ? featured : normal).push(idx));

  const INTERVAL = 6;
  let html = '';
  let featuredPos = 0;
  normal.forEach((idx, i) => {
    html += cardHtml(items[idx], idx);
    if ((i + 1) % INTERVAL === 0 && featuredPos < featured.length) {
      html += bannerHtml(items[featured[featuredPos]], featured[featuredPos]);
      featuredPos++;
    }
  });
  while (featuredPos < featured.length) {
    html += bannerHtml(items[featured[featuredPos]], featured[featuredPos]);
    featuredPos++;
  }

  grid.innerHTML = html;
  grid.querySelectorAll('.card, .banner-card').forEach(el => {
    el.addEventListener('click', () => openModal(currentItems[+el.dataset.idx]));
  });
}

function openModal(item) {
  document.getElementById('modalSource').textContent = item.source;
  document.getElementById('modalTime').textContent = timeAgo(item.published_ts);
  document.getElementById('modalTitle').textContent = item.title;
  const note = document.getElementById('modalExcerptNote');
  const body = document.getElementById('modalBody');
  const fullBox = document.getElementById('modalFullContent');
  const toggleBtn = document.getElementById('modalToggleFull');

  fullBox.style.display = 'none';
  fullBox.innerHTML = '';
  toggleBtn.style.display = 'none';
  toggleBtn.onclick = null;

  if (item.ai_summary) {
    note.style.display = 'none';
    body.innerHTML = `<div class="ai-badge">✨ AI 요약</div><div class="ai-summary-text">${escapeHtml(item.ai_summary)}</div>`;
    if (item.is_full && item.content_html) {
      toggleBtn.style.display = 'inline-block';
      toggleBtn.textContent = '전체 본문 보기 ▾';
      toggleBtn.onclick = () => {
        const showing = fullBox.style.display === 'block';
        fullBox.style.display = showing ? 'none' : 'block';
        fullBox.innerHTML = showing ? '' : item.content_html;
        toggleBtn.textContent = showing ? '전체 본문 보기 ▾' : '전체 본문 접기 ▴';
      };
    }
  } else if (item.is_full) {
    note.style.display = 'none';
    body.innerHTML = item.content_html || item.summary || '';
  } else {
    note.style.display = 'block';
    note.textContent = 'AI 요약을 준비 중이에요. 잠시 후 다시 열어봐 주세요.';
    body.innerHTML = escapeHtml(item.summary || '');
  }

  const link = document.getElementById('modalLink');
  if (item.link) {
    link.href = item.link;
    link.style.display = 'inline-block';
  } else {
    link.style.display = 'none';
  }
  overlay.classList.add('open');
}

function closeModal() {
  overlay.classList.remove('open');
}

document.getElementById('modalClose').addEventListener('click', closeModal);
overlay.addEventListener('click', (e) => {
  if (e.target === overlay) closeModal();
});
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') closeModal();
});

async function loadItems() {
  const params = new URLSearchParams({ limit: 100 });
  if (currentCategory) params.set('category', currentCategory);
  const res = await fetch('/api/items?' + params.toString());
  const data = await res.json();
  renderItems(data.items);
}

async function loadTabs() {
  const res = await fetch('/api/sources');
  const data = await res.json();
  const categories = [...new Set(data.sources.map(s => s.category))];
  const all = [{ label: '전체', value: null }, ...categories.map(c => ({ label: c, value: c }))];
  tabsEl.innerHTML = all.map(t => {
    const dot = t.value ? `<span class="tab-dot" style="background:${categoryColors(t.value).border}"></span>` : '';
    return `<div class="tab${t.value === currentCategory ? ' active' : ''}" data-value="${t.value ?? ''}">${dot}${escapeHtml(t.label)}</div>`;
  }).join('');
  tabsEl.querySelectorAll('.tab').forEach(el => {
    el.addEventListener('click', () => {
      currentCategory = el.dataset.value || null;
      tabsEl.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
      loadItems();
    });
  });
}

loadTabs();
loadItems();
setInterval(loadItems, 5 * 60 * 1000);
</script>
</body>
</html>
